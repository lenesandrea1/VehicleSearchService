services:
  mongodb:
    image: mongo:7
    container_name: vehiclesearch-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"

  mysql:
    image: mysql:8.0
    container_name: vehiclesearch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: local
      MYSQL_DATABASE: vehiclesearch
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
